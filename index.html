<head>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --blue: #1a56db;
      --blue-dark: #1e40af;
      --green: #276749;
      --green-bg: #f0fff4;
      --yellow: #744210;
      --yellow-bg: #fffbeb;
      --red: #9b2c2c;
      --red-bg: #fff5f5;
      --gray: #718096;
      --border: #e2e8f0;
      --card-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    html { font-size: 16px; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #f0f4f8;
      color: #1a202c;
      min-height: 100vh;
      overscroll-behavior: none;
    }

    /* ── HEADER ── */
    header {
      background: linear-gradient(135deg, var(--blue) 0%, var(--blue-dark) 100%);
      color: white;
      padding: 16px 16px 14px;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 12px rgba(26,86,219,0.3);
    }
    .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .header-title { font-size: 19px; font-weight: 700; letter-spacing: -0.3px; }
    .last-updated { font-size: 11px; opacity: 0.75; }
    .stats-bar { display: flex; gap: 0; }
    .stat {
      flex: 1;
      text-align: center;
      padding: 8px 4px 6px;
      border-radius: 10px;
      background: rgba(255,255,255,0.12);
    }
    .stat + .stat { margin-left: 8px; }
    .stat-num { font-size: 24px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 10px; opacity: 0.75; text-transform: uppercase; letter-spacing: 0.5px; margin-top: 2px; }

    /* ── FILTERS ── */
    .filter-bar {
      background: white;
      padding: 10px 12px;
      display: flex;
      gap: 7px;
      overflow-x: auto;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 108px;
      z-index: 99;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-btn {
      padding: 6px 14px;
      border-radius: 20px;
      border: 1.5px solid #cbd5e0;
      background: white;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      color: #4a5568;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .filter-btn.active {
      background: var(--blue);
      border-color: var(--blue);
      color: white;
    }

    /* ── SORT BAR ── */
    .sort-bar {
      padding: 8px 16px;
      background: #f7fafc;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--gray);
    }
    .sort-bar select {
      font-size: 12px;
      border: none;
      background: transparent;
      color: #4a5568;
      font-weight: 600;
      cursor: pointer;
      outline: none;
    }
    .count-label { margin-left: auto; font-weight: 500; }

      flex-direction: column;
      gap: 11px;
      padding-bottom: 32px;

      border-radius: 14px;

    .job-card.applied { opacity: 0.55; }

      display: flex;
      align-items: flex-start;
      gap: 11px;
    }
    .company-icon {
      width: 46px;
      height: 46px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      font-weight: 800;
      color: white;
      flex-shrink: 0;
      letter-spacing: -0.5px;

    .card-title-block { flex: 1; min-width: 0; }
    .card-role {

      font-weight: 700;
      color: #1a202c;
      line-height: 1.25;
      margin-bottom: 2px;

    .card-company { font-size: 13px; color: #4a5568; font-weight: 500; }
    .score-badge {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      border-radius: 11px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 1px;
    }
    .score-num { font-size: 20px; font-weight: 800; line-height: 1; }
    .score-lbl { font-size: 9px; text-transform: uppercase; letter-spacing: 0.3px; font-weight: 600; }
    .tier-a { background: var(--green-bg); color: var(--green); }
    .tier-b { background: var(--yellow-bg); color: var(--yellow); }
    .tier-c { background: var(--red-bg); color: var(--red); }

      padding: 10px 14px 0;
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
    }

      align-items: center;
      gap: 3px;
      font-size: 11.5px;
      padding: 3px 8px;
      border-radius: 20px;
      font-weight: 500;

    .tag-work { background: var(--green-bg); color: var(--green); }
    .tag-lang { background: #faf5ff; color: #553c9a; }
    .tag-src { background: #f7fafc; color: #718096; }

    .card-why {
      margin: 10px 14px 0;
      background: #f7fafc;
      border-radius: 9px;
      overflow: hidden;
    }
    .why-toggle {
      padding: 9px 12px;
      font-size: 12px;
      color: #4a5568;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      -webkit-tap-highlight-color: transparent;
      user-select: none;

    .why-arrow.open { transform: rotate(180deg); }
    .why-body {
      font-size: 12.5px;
      color: #4a5568;
      line-height: 1.55;
      padding: 0 12px;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.25s ease, padding 0.25s;

    .why-body.open { max-height: 300px; padding: 0 12px 10px; }
    .stretch {
      font-size: 11.5px;
      color: #c05621;
      margin-top: 6px;
      font-style: italic;
    }

    .card-actions {
      padding: 12px 14px 14px;
      display: flex;
      gap: 8px;
      align-items: center;
    }
    .btn-apply {
      flex: 1;
      padding: 11px 16px;
      background: var(--blue);
      color: white;
      border: none;
      border-radius: 9px;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      text-align: center;
      display: block;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-applied {
      padding: 11px 12px;
      background: #edf2f7;
      color: #4a5568;
      border: none;
      border-radius: 9px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .btn-applied.marked { background: var(--green-bg); color: var(--green); }

    /* ── EMPTY STATE ── */
    .empty {
      text-align: center;
      padding: 60px 20px;
      color: var(--gray);
    }
    .empty-icon { font-size: 48px; margin-bottom: 14px; }
    .empty-title { font-size: 16px; font-weight: 600; margin-bottom: 6px; }
    .empty-sub { font-size: 13px; }

    /* ── SCORE BAR ── */
    .score-bar-wrap { padding: 0 14px 10px; }
    .score-bar-bg {
      height: 4px;
      background: #e2e8f0;
      border-radius: 2px;
      overflow: hidden;
    }
    .score-bar-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.3s;
    }

    @media (min-width: 600px) {
      .jobs-list { max-width: 560px; margin: 0 auto; }
      .filter-bar { justify-content: center; }
      .sort-bar { max-width: 560px; margin: 0 auto; }
    }
  </style>
</head>

function scoreBarColor(score) { return score >= 85 ? '#38a169' : score >= 75 ? '#d97706' : '#e53e3e'; }

// ── RENDER ──
function render() {
  let matches = [...DATA.matches];

  // Filter
  matches = matches.filter(j => {
    const t = j.title.toLowerCase();
    if (filter === 'csm')        return t.includes('customer success');
    if (filter === 'am')         return t.includes('account manager');
    if (filter === 'new')        return newIds.has(j.id);
    if (filter === 'top')        return j.score >= 85;
    if (filter === 'applied')    return !!applied[j.id];
    if (filter === 'not-applied') return !applied[j.id];
    return true;
  });

  // Sort
  if (sort === 'score')   matches.sort((a, b) => b.score - a.score);
  else                    matches.sort((a, b) => a.company.localeCompare(b.company));

  // Count
  document.getElementById('countLabel').textContent = matches.length + ' job' + (matches.length !== 1 ? 's' : '');

  const list = document.getElementById('jobsList');

  if (!matches.length) {
    list.innerHTML = `
      <div class="empty">
        <div class="empty-icon">🔍</div>
        <div class="empty-title">No matches</div>
        <div class="empty-sub">Try a different filter</div>
      </div>`;
    return;
  }

  list.innerHTML = matches.map(j => {
    const isApplied = !!applied[j.id];
    const isNew = newIds.has(j.id);
    const tc = tierClass(j.score);
    const barW = Math.round(((j.score - 70) / 30) * 100);
    const srcShort = j.source.split(' ')[0].replace(/[—-].*/, '').trim();

    return `
    <div class="job-card ${isApplied ? 'applied' : ''}" id="card-${j.id}">
      <div class="card-header">
        <div class="company-icon" style="background:${colorFor(j.company)}">${initials(j.company)}</div>
        <div class="card-title-block">
          <div class="card-role">${isNew ? '🆕 ' : ''}${j.title}</div>
          <div class="card-company">${j.company}</div>
        </div>
        <div class="score-badge ${tc}">
          <div class="score-num">${j.score}</div>
          <div class="score-lbl">match</div>
        </div>
      </div>
      <div class="score-bar-wrap" style="padding:6px 14px 0">
        <div class="score-bar-bg">
          <div class="score-bar-fill" style="width:${barW}%;background:${scoreBarColor(j.score)}"></div>
        </div>
      </div>
      <div class="card-meta">
        <span class="tag tag-loc">📍 ${j.location}</span>
        <span class="tag tag-work">${j.work_model}</span>
        ${j.language ? `<span class="tag tag-lang">🗣️ ${j.language}</span>` : ''}
        <span class="tag tag-src">${srcShort}</span>
      </div>
      <div class="card-why">
        <div class="why-toggle" onclick="toggleWhy('${j.id}')">
          <span>Why I match</span>
          <span class="why-arrow" id="arr-${j.id}">▼</span>
        </div>
        <div class="why-body" id="why-${j.id}">
          ${j.why_match}
          ${j.stretch ? `<div class="stretch">⚠️ ${j.stretch}</div>` : ''}
        </div>
      </div>
      <div class="card-actions">
        <a class="btn-apply" href="${j.url}" target="_blank" rel="noopener noreferrer">Apply →</a>
        <button class="btn-applied ${isApplied ? 'marked' : ''}" onclick="toggleApplied('${j.id}')">
          ${isApplied ? '✓ Applied' : 'Mark Applied'}
        </button>
      </div>
    </div>`;
  }).join('');

  updateStats();
}

function toggleWhy(id) {
  const body = document.getElementById('why-' + id);
  const arr  = document.getElementById('arr-' + id);
  body.classList.toggle('open');
  arr.classList.toggle('open');
}

function toggleApplied(id) {
  if (applied[id]) delete applied[id];
  else applied[id] = Date.now();
  localStorage.setItem('jsa_applied', JSON.stringify(applied));
  render();
}

function updateStats() {
  const all = DATA.matches;
  document.getElementById('statTotal').textContent   = all.length;
  document.getElementById('statTop').textContent     = all.filter(j => j.score >= 85).length;
  document.getElementById('statNew').textContent     = newIds.size;
  document.getElementById('statApplied').textContent = Object.keys(applied).filter(id => all.find(j => j.id === id)).length;
}

// Filter buttons
document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filter = btn.dataset.filter;
    render();
  });
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sort = e.target.value;
  render();
});

// Last updated
if (DATA.last_run) {
  const d = new Date(DATA.last_run);
  document.getElementById('lastUpdated').textContent =
    'Updated ' + d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' }) +
    ' ' + d.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' });
}

render();
</script>
</body>
</html>
